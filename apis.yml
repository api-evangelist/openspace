aid: openspace
name: OpenSpace
description: >-
  OpenSpace is a visual intelligence platform for the construction industry,
  headquartered at 333 Kearny Street, San Francisco, California. The company
  pairs an off-the-shelf 360-degree camera worn on a hardhat with computer-vision
  software that automatically maps captured imagery to construction floor plans
  and BIM models, producing a navigable, time-indexed visual record of every
  jobsite walk. The platform is built around five products: Capture (complete
  visual record), Field (image-based task management with AI Autolocation),
  Track (AI-driven progress tracking against schedule), Air (drone imagery
  management), and BIM+ (3D field tools). OpenSpace reports more than 69
  billion square feet captured across projects in 131 countries, with regional
  presence in Australia, Canada, EU, Japan, Saudi Arabia, Singapore, and the
  United Kingdom. The company is led by CEO and co-founder Jeevan Kalanithi.
  OpenSpace integrates with the major construction software stacks, including
  Procore, Autodesk Construction Cloud / Autodesk Build, Revizto, PlanGrid, and
  Bluebeam. A REST API exists for partner and enterprise integration but is
  not publicly self-serve; integration access is obtained via OpenSpace's
  support and partner channels.
